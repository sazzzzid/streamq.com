<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="StreamQ Player preview">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" />
      <stop offset="45%" stop-color="#121214" />
      <stop offset="100%" stop-color="#0a0a0b" />
    </linearGradient>
    <radialGradient id="glow-orange" cx="22%" cy="78%" r="55%">
      <stop offset="0%" stop-color="#e85a24" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#e85a24" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-blue" cx="82%" cy="18%" r="50%">
      <stop offset="0%" stop-color="#2f6bff" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#2f6bff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="bar-fill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e85a24" />
      <stop offset="100%" stop-color="#ff8a4c" />
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1" />
    </pattern>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)" />
  <rect width="1920" height="1080" fill="url(#grid)" />
  <rect width="1920" height="1080" fill="url(#glow-orange)" />
  <rect width="1920" height="1080" fill="url(#glow-blue)" />

  <g opacity="0.14">
    <rect x="120" y="420" width="1680" height="3" rx="1.5" fill="#ffffff" />
    <rect x="200" y="460" width="1520" height="2" rx="1" fill="#ffffff" />
    <rect x="280" y="500" width="1360" height="2" rx="1" fill="#ffffff" />
    <rect x="160" y="540" width="1600" height="3" rx="1.5" fill="#ffffff" />
  </g>

  <g opacity="0.9" filter="url(#soft-shadow)">
    <circle cx="960" cy="520" r="120" fill="none" stroke="#fff9f0" stroke-width="3" stroke-opacity="0.12" />
    <circle cx="960" cy="520" r="88" fill="none" stroke="#e85a24" stroke-width="4" stroke-opacity="0.55" />
    <text
      x="960"
      y="538"
      text-anchor="middle"
      fill="#fff9f0"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
      font-size="88"
      font-weight="800"
      letter-spacing="-0.06em"
    >
      Q
    </text>
  </g>

  <g>
    <rect x="48" y="40" width="188" height="44" rx="22" fill="#141414" fill-opacity="0.72" stroke="#ffffff" stroke-opacity="0.08" />
    <text
      x="68"
      y="70"
      fill="#fff9f0"
      font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
      font-size="22"
      font-weight="700"
    >
      @streamq/player
    </text>
    <rect x="1720" y="48" width="112" height="36" rx="18" fill="#e85a24" />
    <circle cx="1744" cy="66" r="6" fill="#fff9f0" />
    <text
      x="1760"
      y="72"
      fill="#fff9f0"
      font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
      font-size="18"
      font-weight="700"
    >
      LIVE
    </text>
  </g>

  <rect x="0" y="920" width="1920" height="160" fill="#141414" fill-opacity="0.88" />
  <rect x="80" y="972" width="1200" height="8" rx="4" fill="#ffffff" fill-opacity="0.12" />
  <rect x="80" y="972" width="420" height="8" rx="4" fill="url(#bar-fill)" />
  <circle cx="80" cy="976" r="10" fill="#e85a24" />

  <g fill="#fff9f0" fill-opacity="0.55">
    <rect x="80" y="1010" width="14" height="14" rx="3" />
    <rect x="108" y="1010" width="14" height="14" rx="3" />
    <rect x="136" y="1010" width="80" height="14" rx="3" fill-opacity="0.25" />
  </g>

  <text
    x="1760"
    y="1024"
    text-anchor="end"
    fill="#fff9f0"
    font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
    font-size="20"
    font-weight="600"
    fill-opacity="0.45"
  >
    HLS / DASH / MP4
  </text>

  <text
    x="960"
    y="660"
    text-anchor="middle"
    fill="#fff9f0"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
    font-size="24"
    font-weight="600"
    fill-opacity="0.45"
    letter-spacing="0.12em"
  >
    STREAMQ
  </text>
</svg>
